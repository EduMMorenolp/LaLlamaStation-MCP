version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mcp-ollama-motor
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mcp-network
    restart: always

  mcp-server:
    build:
      context: ./ollama-mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server-app
    volumes:
      - ollama_data:/root/.ollama:ro
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - APP_PORT=${APP_PORT:-3000}
      - API_KEY=${API_KEY:-super-secret-mcp-key}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    networks:
      - mcp-network
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mcp-ngrok-tunnel
    depends_on:
      - mcp-server
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - mcp-server:${APP_PORT:-3000}
    networks:
      - mcp-network
    restart: always

networks:
  mcp-network:
    driver: bridge

volumes:
  ollama_data:
